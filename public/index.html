<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Ion</title>

        <!-- Meta Tags & Icons -->
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-title" content="Lumifillet" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="default" />
        <meta name="theme-color" content="#0a0a0a" />
        <link rel="manifest" href="/manifest.json" />
        <link rel="icon" type="image/png" href="/favicon.png" />
        <link rel="apple-touch-icon" href="/favicon.png" />

        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="/__/firebase/12.11.0/firebase-app-compat.js"></script>
        <script src="/__/firebase/12.11.0/firebase-database-compat.js"></script>
        <script src="/__/firebase/init.js?useEmulator=true"></script>

        <style>
            @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap");
            body {
                font-family: "Inter", sans-serif;
                background-color: #0a0a0a;
                color: #f5f5f5;
                -webkit-tap-highlight-color: transparent;
            }
            .glass {
                background: rgba(255, 255, 255, 0.03);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.1);
            }
            .ion-btn {
                transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .ion-btn:active {
                transform: scale(0.95);
            }
            .active-sleep {
                border-color: #a855f7 !important;
                box-shadow: 0 0 20px rgba(168, 85, 247, 0.2);
            }
            .active-exercise {
                border-color: #3b82f6 !important;
                box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
            }
            .active-study {
                border-color: #10b981 !important;
                box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
            }
            .active-eat {
                border-color: #f59e0b !important;
                box-shadow: 0 0 20px rgba(245, 158, 11, 0.2);
            }
            .no-scrollbar::-webkit-scrollbar {
                display: none;
            }
        </style>
    </head>
    <body class="min-h-screen flex flex-col">
        <header
            class="p-6 flex justify-between items-center max-w-2xl mx-auto w-full"
        >
            <h1
                class="text-3xl font-extrabold tracking-tighter text-purple-500"
            >
                ION
            </h1>
            <div
                id="connectionStatus"
                class="text-[10px] uppercase tracking-widest text-gray-500 flex items-center gap-2"
            >
                <div
                    id="statusDot"
                    class="w-1.5 h-1.5 rounded-full bg-yellow-500"
                ></div>
                <span id="statusText">Standby</span>
            </div>
        </header>

        <main class="max-w-2xl mx-auto px-6 space-y-8 flex-grow w-full">
            <!-- Quick Actions -->
            <section class="grid grid-cols-2 gap-4">
                <button
                    id="sleepBtn"
                    class="ion-btn glass p-6 rounded-3xl flex flex-col items-center justify-center gap-2 border-2 border-purple-500/20"
                >
                    <span id="sleepLabel" class="font-bold text-sm">Sleep</span>
                    <span
                        id="sleepTimer"
                        class="text-[10px] text-gray-500 uppercase tracking-tighter"
                        >Ready</span
                    >
                </button>
                <button
                    id="studyBtn"
                    class="ion-btn glass p-6 rounded-3xl flex flex-col items-center justify-center gap-2 border-2 border-emerald-500/20"
                >
                    <span id="studyLabel" class="font-bold text-sm">Study</span>
                    <span
                        id="studyTimer"
                        class="text-[10px] text-gray-500 uppercase tracking-tighter"
                        >Ready</span
                    >
                </button>
                <button
                    id="exerciseBtn"
                    class="ion-btn glass p-6 rounded-3xl flex flex-col items-center justify-center gap-2 border-2 border-blue-500/20"
                >
                    <span id="exerciseLabel" class="font-bold text-sm"
                        >Exercise</span
                    >
                    <span
                        id="exerciseTimer"
                        class="text-[10px] text-gray-500 uppercase tracking-tighter"
                        >Ready</span
                    >
                </button>
                <button
                    id="eatBtn"
                    class="ion-btn glass p-6 rounded-3xl flex flex-col items-center justify-center gap-2 border-2 border-amber-500/20"
                >
                    <span id="eatLabel" class="font-bold text-sm">Eat</span>
                    <span
                        id="eatTimer"
                        class="text-[10px] text-gray-500 uppercase tracking-tighter"
                        >Ready</span
                    >
                </button>
            </section>

            <!-- Stats Section -->
            <section class="glass p-6 rounded-3xl space-y-4">
                <div class="flex justify-between items-center">
                    <p
                        class="text-[10px] text-gray-500 uppercase tracking-widest"
                    >
                        Analytics
                    </p>
                    <div class="flex gap-1 bg-black/40 p-1 rounded-xl">
                        <button
                            id="rangeWeek"
                            class="chart-filter-btn px-3 py-1 text-[9px] uppercase font-bold rounded-lg bg-white/10"
                        >
                            Week
                        </button>
                        <button
                            id="rangeMonth"
                            class="chart-filter-btn px-3 py-1 text-[9px] uppercase font-bold rounded-lg"
                        >
                            Month
                        </button>
                        <button
                            id="rangeYear"
                            class="chart-filter-btn px-3 py-1 text-[9px] uppercase font-bold rounded-lg"
                        >
                            Year
                        </button>
                    </div>
                </div>
                <div class="h-48 w-full">
                    <canvas id="achievementChart"></canvas>
                </div>
            </section>

            <!-- Navigator & Logs -->
            <section class="space-y-4 pb-8">
                <div class="flex justify-between items-center px-2">
                    <h3
                        class="text-sm font-bold text-gray-500 uppercase tracking-widest"
                    >
                        History
                    </h3>
                    <button
                        id="clearDayBtn"
                        class="text-[10px] text-red-500/60 hover:text-red-500 uppercase font-bold hidden"
                    >
                        Delete Day
                    </button>
                </div>

                <div
                    id="dayPicker"
                    class="flex justify-between gap-1 overflow-x-auto no-scrollbar pb-2"
                ></div>

                <div id="logHistory" class="space-y-3 min-h-[120px]">
                    <div
                        class="flex flex-col items-center justify-center py-10 text-gray-600"
                    >
                        <div
                            class="animate-spin rounded-full h-4 w-4 border-b-2 border-purple-500 mb-2"
                        ></div>
                        <span class="text-[10px] uppercase tracking-widest"
                            >Fetching Data...</span
                        >
                    </div>
                </div>
            </section>
        </main>

        <footer
            class="max-w-2xl mx-auto w-full px-6 py-8 flex flex-col items-center gap-4 border-t border-white/5 mt-10"
        >
            <p class="text-[8px] text-gray-800 uppercase tracking-widest">
                Ion v1.0
            </p>
        </footer>

        <div
            id="toast"
            class="fixed bottom-8 left-1/2 -translate-x-1/2 glass px-6 py-3 rounded-full text-xs opacity-0 transition-all duration-300 z-50"
        ></div>

        <script>
            // Utilities
            const getYear = (d) => d.getFullYear();
            const getWeekNumber = (d) => {
                const date = new Date(d.getTime());
                date.setHours(0, 0, 0, 0);
                date.setDate(date.getDate() + 3 - ((date.getDay() + 6) % 7));
                const week1 = new Date(date.getFullYear(), 0, 4);
                return (
                    Math.round(
                        ((date.getTime() - week1.getTime()) / 86400000 -
                            3 +
                            ((week1.getDay() + 6) % 7)) /
                            7,
                    ) + 1
                );
            };
            const getDateKey = (d) => d.toISOString().split("T")[0];

            const REV_MAP = { SLEEP: 0, STUDY: 1, EXERCISE: 2, EAT: 3 };
            const LABEL_MAP = {
                0: "Sleep",
                1: "Study",
                2: "Exercise",
                3: "Eating",
            };
            const COLOR_MAP = {
                0: "#a855f7",
                1: "#10b981",
                2: "#3b82f6",
                3: "#f59e0b",
            };

            window.addEventListener("load", () => {
                const db = firebase.database();
                const activeRef = db.ref("activeSessions");

                let chartInstance = null;
                let currentSelectedDate = new Date();
                let currentRange = "week";
                let disabledButtons = new Set();
                let activeSessions = {};
                let runningIntervals = {};

                const getLogPath = (date) =>
                    `logs/${getYear(date)}/w${getWeekNumber(date)}/${getDateKey(date)}`;
                const getWeekPath = (date) =>
                    `logs/${getYear(date)}/w${getWeekNumber(date)}`;

                fetchSpecificDay(new Date());
                fetchChartData("week");

                async function fetchSpecificDay(date) {
                    const dateKey = getDateKey(date);
                    const path = getLogPath(date);

                    setLoading(true);
                    const snapshot = await db.ref(path).once("value");
                    const data = snapshot.val();

                    if (!data) {
                        if (dateKey !== getDateKey(new Date())) {
                            disabledButtons.add(dateKey);
                        }
                        renderDayPicker();
                    }

                    renderLogs(data || {}, dateKey);
                    setLoading(false);
                }

                async function fetchChartData(range) {
                    const now = new Date();
                    let data = {};
                    currentRange = range;

                    // Update UI active state
                    document
                        .querySelectorAll(".chart-filter-btn")
                        .forEach((btn) => {
                            if (
                                btn.id ===
                                "range" +
                                    range.charAt(0).toUpperCase() +
                                    range.slice(1)
                            ) {
                                btn.classList.add("bg-white/10");
                            } else {
                                btn.classList.remove("bg-white/10");
                            }
                        });

                    setLoading(true);
                    if (range === "week") {
                        const snap = await db
                            .ref(getWeekPath(now))
                            .once("value");
                        data = snap.val() || {};
                    } else {
                        const snap = await db
                            .ref(`logs/${getYear(now)}`)
                            .once("value");
                        const yearData = snap.val() || {};
                        Object.values(yearData).forEach((week) => {
                            Object.assign(data, week);
                        });
                    }

                    updateChart(data, range);
                    setLoading(false);
                }

                function handleToggle(type) {
                    if (!activeSessions[type]) {
                        activeRef.child(type).set(Date.now());
                    } else {
                        const startTime = activeSessions[type];
                        const now = Date.now();
                        const dur = Math.round((now - startTime) / 60000) || 1;
                        const path = getLogPath(new Date());

                        db.ref(path)
                            .push({ t: now, m: REV_MAP[type], d: dur })
                            .then(() => {
                                activeRef.child(type).remove();
                                showToast(`Logged ${dur}m ${type}`);
                                if (
                                    getDateKey(currentSelectedDate) ===
                                    getDateKey(new Date())
                                ) {
                                    fetchSpecificDay(new Date());
                                }
                                fetchChartData(currentRange);
                            });
                    }
                }

                function clearDayLogs() {
                    if (
                        confirm(
                            `Clear all logs for ${getDateKey(currentSelectedDate)}?`,
                        )
                    ) {
                        db.ref(getLogPath(currentSelectedDate))
                            .remove()
                            .then(() => {
                                fetchSpecificDay(currentSelectedDate);
                                fetchChartData(currentRange);
                            });
                    }
                }

                function renderDayPicker() {
                    const picker = document.getElementById("dayPicker");
                    picker.innerHTML = "";
                    const now = new Date();
                    const monday = new Date(now);
                    const dayOffset =
                        monday.getDay() === 0 ? 6 : monday.getDay() - 1;
                    monday.setDate(now.getDate() - dayOffset);

                    for (let i = 0; i < 7; i++) {
                        const d = new Date(monday);
                        d.setDate(monday.getDate() + i);
                        const key = getDateKey(d);
                        const isSelected =
                            getDateKey(currentSelectedDate) === key;
                        const isDisabled = disabledButtons.has(key);

                        const btn = document.createElement("button");
                        btn.className = `flex-1 min-w-[45px] py-3 rounded-2xl flex flex-col items-center transition-all border-2 ${
                            isSelected
                                ? "bg-purple-600/20 border-purple-500/50 text-white"
                                : "glass border-transparent text-gray-500"
                        } ${isDisabled ? "opacity-20 cursor-not-allowed scale-90" : "hover:bg-white/5"}`;

                        btn.innerHTML = `<span class="text-[8px] uppercase font-bold">${d.toLocaleDateString("en-US", { weekday: "short" })}</span>
                                     <span class="text-sm font-black">${d.getDate()}</span>`;

                        btn.onclick = () => {
                            if (!isDisabled) {
                                currentSelectedDate = d;
                                renderDayPicker();
                                fetchSpecificDay(d);
                            }
                        };
                        picker.appendChild(btn);
                    }
                }

                function renderLogs(logs, dateKey) {
                    const container = document.getElementById("logHistory");
                    const clearDayBtn = document.getElementById("clearDayBtn");
                    container.innerHTML = "";

                    const entries = Object.entries(logs).sort(
                        (a, b) => b[1].t - a[1].t,
                    );
                    clearDayBtn.classList.toggle(
                        "hidden",
                        entries.length === 0,
                    );

                    if (entries.length === 0) {
                        container.innerHTML = `<div class="text-center py-10 text-gray-600 text-[10px] uppercase tracking-widest italic">No Data Found</div>`;
                        return;
                    }

                    entries.forEach(([id, log]) => {
                        const time = new Date(log.t).toLocaleTimeString([], {
                            hour: "2-digit",
                            minute: "2-digit",
                        });
                        const div = document.createElement("div");
                        div.className =
                            "glass p-4 rounded-2xl flex justify-between items-center animate-in fade-in slide-in-from-bottom-1";
                        div.innerHTML = `
                        <div class="flex items-center gap-3">
                            <div class="w-1.5 h-1.5 rounded-full" style="background:${COLOR_MAP[log.m]}"></div>
                            <div>
                                <p class="text-xs font-bold">${LABEL_MAP[log.m]}</p>
                                <p class="text-[9px] text-gray-500">${time}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="text-[10px] font-mono text-gray-500">${log.d}m</span>
                            <button onclick="window.deleteEntry('${id}')" class="text-red-900/40 hover:text-red-500 transition-colors">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2"/></svg>
                            </button>
                        </div>`;
                        container.appendChild(div);
                    });

                    window.deleteEntry = (id) => {
                        if (confirm("Delete entry?")) {
                            db.ref(getLogPath(currentSelectedDate))
                                .child(id)
                                .remove()
                                .then(() => {
                                    fetchSpecificDay(currentSelectedDate);
                                    fetchChartData(currentRange);
                                });
                        }
                    };
                }

                function updateChart(data, range) {
                    const ctx = document
                        .getElementById("achievementChart")
                        .getContext("2d");
                    const labels = [];
                    const ds = [0, 1, 2, 3].map((m) => ({
                        label: LABEL_MAP[m],
                        data: [],
                        backgroundColor: COLOR_MAP[m],
                        borderRadius: 4,
                    }));

                    const count =
                        range === "week" ? 7 : range === "month" ? 30 : 12;
                    const now = new Date();

                    for (let i = count - 1; i >= 0; i--) {
                        const d = new Date();
                        if (range === "year") {
                            d.setMonth(now.getMonth() - i);
                            labels.push(
                                d.toLocaleString("default", { month: "short" }),
                            );

                            ds.forEach((s) => {
                                let monthSum = 0;
                                // Search all data for logs within this month/year
                                Object.entries(data).forEach(
                                    ([dateKey, dayLogs]) => {
                                        const lDate = new Date(dateKey);
                                        if (
                                            lDate.getMonth() === d.getMonth() &&
                                            lDate.getFullYear() ===
                                                d.getFullYear()
                                        ) {
                                            monthSum += Object.values(dayLogs)
                                                .filter(
                                                    (l) =>
                                                        l.m ===
                                                        REV_MAP[
                                                            s.label.toUpperCase()
                                                        ],
                                                )
                                                .reduce(
                                                    (a, b) => a + (b.d || 0),
                                                    0,
                                                );
                                        }
                                    },
                                );
                                s.data.push(monthSum);
                            });
                        } else {
                            d.setDate(now.getDate() - i);
                            labels.push(d.getDate());
                            const dayData = data[getDateKey(d)] || {};
                            ds.forEach((s) => {
                                const sum = Object.values(dayData)
                                    .filter(
                                        (l) =>
                                            l.m ===
                                            REV_MAP[s.label.toUpperCase()],
                                    )
                                    .reduce((a, b) => a + (b.d || 0), 0);
                                s.data.push(sum);
                            });
                        }
                    }

                    if (chartInstance) chartInstance.destroy();
                    chartInstance = new Chart(ctx, {
                        type: "bar",
                        data: { labels, datasets: ds },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: {
                                x: {
                                    stacked: true,
                                    grid: { display: false },
                                    ticks: { color: "#444", font: { size: 9 } },
                                },
                                y: {
                                    stacked: true,
                                    grid: { color: "#1a1a1a" },
                                    ticks: { color: "#444", font: { size: 9 } },
                                },
                            },
                        },
                    });
                }

                function setLoading(v) {
                    document.getElementById("statusDot").className =
                        `w-1.5 h-1.5 rounded-full ${v ? "bg-blue-500 animate-pulse" : "bg-green-500"}`;
                    document.getElementById("statusText").textContent = v
                        ? "Loading..."
                        : "Synced";
                }

                function showToast(m) {
                    const t = document.getElementById("toast");
                    t.textContent = m;
                    t.classList.replace("opacity-0", "opacity-100");
                    setTimeout(
                        () => t.classList.replace("opacity-100", "opacity-0"),
                        2000,
                    );
                }

                activeRef.on("value", (snap) => {
                    const data = snap.val() || {};
                    ["SLEEP", "STUDY", "EXERCISE", "EAT"].forEach((type) => {
                        const start = data[type];
                        const id = type.toLowerCase();
                        const btn = document.getElementById(id + "Btn");
                        if (start) {
                            activeSessions[type] = start;
                            btn.classList.add("active-" + id);
                            document.getElementById(id + "Label").textContent =
                                "Stop " + type;
                            if (runningIntervals[type])
                                clearInterval(runningIntervals[type]);
                            runningIntervals[type] = setInterval(() => {
                                const diff = Math.floor(
                                    (Date.now() - start) / 1000,
                                );
                                document.getElementById(
                                    id + "Timer",
                                ).textContent =
                                    `${Math.floor(diff / 60)}m ${diff % 60}s`;
                            }, 1000);
                        } else {
                            activeSessions[type] = null;
                            btn.classList.remove("active-" + id);
                            document.getElementById(id + "Label").textContent =
                                type.charAt(0) + type.slice(1).toLowerCase();
                            document.getElementById(id + "Timer").textContent =
                                "Ready";
                            clearInterval(runningIntervals[type]);
                        }
                    });
                });

                document.getElementById("sleepBtn").onclick = () =>
                    handleToggle("SLEEP");
                document.getElementById("studyBtn").onclick = () =>
                    handleToggle("STUDY");
                document.getElementById("exerciseBtn").onclick = () =>
                    handleToggle("EXERCISE");
                document.getElementById("eatBtn").onclick = () =>
                    handleToggle("EAT");
                document.getElementById("clearDayBtn").onclick = clearDayLogs;
                document.getElementById("rangeWeek").onclick = () =>
                    fetchChartData("week");
                document.getElementById("rangeMonth").onclick = () =>
                    fetchChartData("month");
                document.getElementById("rangeYear").onclick = () =>
                    fetchChartData("year");
            });
        </script>
    </body>
</html>
